name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  android-build:
    name: Android build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Android targets
        run: ./gradlew :lib:assembleAndroidMain :commonApp:assembleAndroidMain :androidApp:assembleDebug

  ios-build:
    name: iOS build and tests
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run iOS simulator tests
        run: ./gradlew :lib:iosSimulatorArm64Test

      - name: Build iOS demo framework
        run: ./gradlew :commonApp:linkDebugFrameworkIosSimulatorArm64
